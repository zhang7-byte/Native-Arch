# XcodeGen spec for the native SwiftUI reforge (iOS + macOS, Liquid Glass).
# Generate the Xcode project with:  xcodegen generate   (run in this folder)
name: NativeArch
options:
  bundleIdPrefix: com.nativearch
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true
targets:
  NativeArch:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - NativeArch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nativearch.labtrack
        PRODUCT_NAME: NativeArch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
