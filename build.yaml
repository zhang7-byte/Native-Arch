# drift code-generation options.
# See https://drift.simonbinder.eu/docs/advanced-features/builder_options/
targets:
  $default:
    builders:
      drift_dev:
        options:
          # Store DateTime columns as ISO-8601 text rather than Unix timestamps.
          # Text timestamps avoid timezone ambiguity and map cleanly onto
          # Postgres `timestamptz` when Supabase sync is added later.
          store_date_time_values_as_text: true
